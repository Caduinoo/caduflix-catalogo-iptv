name: Atualizar Jogos do Dia

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9,13,17,21 * * *"

permissions:
  contents: write

jobs:
  atualizar-jogos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: tools/gerador-jogos-do-dia
        run: npm install

      - name: Gerar jogos do dia
        working-directory: tools/gerador-jogos-do-dia
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_API_BASE_URL:
          FOOTBALL_API_PROVIDER: api-football
          GAMES_OUTPUT_DIR: ../..
          GAMES_TIMEZONE: America/Sao_Paulo
          GAMES_COUNTRY: BR
          GAMES_LANGUAGE: pt-BR
          GAMES_USE_MOCK_WHEN_NO_KEY: "false"
        run: npm run generate

      - name: Verificar alteracoes dos jogos
        id: diff
        shell: bash
        run: |
          git status --short canais/jogos-do-dia.json canais/jogos-canais-map.json
          if git diff --quiet -- canais/jogos-do-dia.json canais/jogos-canais-map.json && \
             git diff --cached --quiet -- canais/jogos-do-dia.json canais/jogos-canais-map.json && \
             [ -z "$(git ls-files --others --exclude-standard canais/jogos-do-dia.json canais/jogos-canais-map.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma alteraÃƒÂ§ÃƒÂ£o nos jogos do dia."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push dos jogos
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add canais/jogos-do-dia.json canais/jogos-canais-map.json
          git commit -m "Atualizar jogos do dia"
          git push