name: Atualizar Jogos do Dia

on:
  schedule:
    - cron: "0 9,15,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rodar gerador de Jogos do Dia
        run: node gerar-jogos-do-dia.js
        env:
          XTREAM_URL: ${{ secrets.XTREAM_URL }}
          XTREAM_USERNAME: ${{ secrets.XTREAM_USERNAME }}
          XTREAM_PASSWORD: ${{ secrets.XTREAM_PASSWORD }}
          PLAY_API_URL: ${{ secrets.PLAY_API_URL }}

      - name: Commit automático se tiver alteração
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add canais/jogos-do-dia.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração em jogos-do-dia.json"
          else
            git commit -m "Atualiza jogos do dia automaticamente"
            git push
          fi
